<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme Color -->

    <meta name="theme-color" content="#050507" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Cinzel:wght@500;700;900&display=swap" rel="stylesheet">

    <!-- iOS PWA Requirements -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Allow Motion & Orientation on iOS -->

    <meta name="apple-mobile-web-app-orientation" content="portrait" />

    <title>StepQuest</title>
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>


    <!-- iOS 13–17 Motion Permission Trigger -->
    <script>
      // Trigger permission once user interacts with page
      document.addEventListener("click", () => {
        if (
          typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function"
        ) {
          DeviceMotionEvent.requestPermission().catch(() => {
            alert("Motion permission is required for step tracking.");
          });
        }
      });
    </script>
  </body>
</html>
